<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Payment Confirmed — TravelyDeal</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&family=DM+Sans:opsz,wght@9..40,400;9..40,500&display=swap" rel="stylesheet"/>
<link rel="icon" href="assets/favicon.ico"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--blue:#3B5BF6;--ink:#0B1230;--green:#22C55E;--gray:#8897B8;--light:#F5F7FF;--border:#E7EBFA}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--light);color:var(--ink);-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;flex-direction:column}
h1,h2{font-family:'Outfit',sans-serif;letter-spacing:-.02em}
a{text-decoration:none;color:inherit}
.nav{background:#fff;border-bottom:1px solid var(--border);padding:0}
.nav-inner{max-width:1200px;margin:0 auto;padding:0 28px;display:flex;align-items:center;height:66px}
.logo-img{height:30px;width:auto;display:block}
.main{flex:1;display:flex;align-items:center;justify-content:center;padding:60px 28px}
.card{background:#fff;border:1px solid var(--border);border-radius:28px;padding:56px 48px;max-width:520px;width:100%;text-align:center;box-shadow:0 20px 60px -20px rgba(11,18,48,.1)}
.icon-wrap{width:72px;height:72px;border-radius:50%;background:rgba(34,197,94,.12);display:flex;align-items:center;justify-content:center;margin:0 auto 28px}
.icon-wrap svg{width:36px;height:36px;color:var(--green)}
h1{font-size:32px;font-weight:900;color:var(--ink);margin-bottom:12px}
.sub{font-size:16px;color:var(--gray);line-height:1.6;margin-bottom:32px}
.btn{display:inline-flex;align-items:center;gap:8px;font-family:'Outfit',sans-serif;font-weight:600;font-size:15px;padding:14px 28px;border-radius:999px;background:var(--blue);color:#fff;cursor:pointer;border:none;transition:transform .2s,box-shadow .2s;box-shadow:0 8px 24px -6px rgba(59,91,246,.5)}
.btn:hover{transform:translateY(-2px);box-shadow:0 14px 32px -6px rgba(59,91,246,.65)}
.note{margin-top:20px;font-size:13px;color:var(--gray)}
.note a{color:var(--blue);font-weight:600}
.foot{text-align:center;padding:24px 28px;font-size:13px;color:var(--gray)}
</style>
</head>
<body>
<nav class="nav">
  <div class="nav-inner">
    <a href="/"><img src="assets/logo-light.png" alt="TravelyDeal" class="logo-img"/></a>
  </div>
</nav>

<main class="main">
  <div class="card">
    <div class="icon-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="m5 13 4 4L19 7"/>
      </svg>
    </div>
    <h1>You're all set!</h1>
    <p class="sub">Your payment was confirmed. Welcome to TravelyDeal — check your inbox for a confirmation email with your account details.</p>
    <a href="/" class="btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width:17px;height:17px"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Back to Home
    </a>
    <p class="note">Questions? <a href="mailto:admin@travelydeal.com">admin@travelydeal.com</a></p>
  </div>
</main>

<footer class="foot">
  © 2026 TravelyDeal &nbsp;·&nbsp; <a href="/privacy" style="color:var(--blue)">Privacy</a> &nbsp;·&nbsp; <a href="/terms" style="color:var(--blue)">Terms</a>
</footer>
</body>
</html>
